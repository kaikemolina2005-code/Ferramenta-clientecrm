version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: advocacia_crm_db
    environment:
      POSTGRES_USER: ${DB_USER:-advocacia_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-advocacia_password}
      POSTGRES_DB: ${DB_NAME:-advocacia_crm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-advocacia_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - advocacia_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: advocacia_crm_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@advocacia.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    networks:
      - advocacia_network
    depends_on:
      - postgres
    restart: unless-stopped

  # Backend API (Production)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: advocacia_backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-advocacia_user}:${DB_PASSWORD:-advocacia_password}@postgres:5432/${DB_NAME:-advocacia_crm}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      WHATSAPP_WEBHOOK_TOKEN: ${WHATSAPP_WEBHOOK_TOKEN}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - advocacia_network
    volumes:
      - ./backend/logs:/app/logs

  # Frontend (Production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: advocacia_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "5173:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - advocacia_network

volumes:
  postgres_data:
    driver: local

networks:
  advocacia_network:
    driver: bridge
