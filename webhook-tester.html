<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testador de Webhook ADVGD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .required {
            color: #e74c3c;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .message.loading {
            background: #e7f3ff;
            color: #004085;
            border: 1px solid #b8daff;
            display: block;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top-color: #004085;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info-box {
            background: #f0f7ff;
            border: 1px solid #b8daff;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #004085;
        }
        
        .icon {
            display: inline-block;
            margin-right: 4px;
        }
        
        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Testador de Webhook</h1>
        <p class="subtitle">ADVGD - Plataforma de Gestão para Escritórios</p>
        
        <div class="info-box">
            <span class="icon">ℹ️</span>
            Webhook URL: <code>http://localhost:3000/api/webhooks/forms</code>
        </div>
        
        <form id="webhookForm">
            <div class="form-group">
                <label for="name">
                    Nome <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    required
                    placeholder="João Silva"
                    value="Teste Webhook HTML"
                >
            </div>
            
            <div class="form-group">
                <label for="email">
                    Email <span class="required">*</span>
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    placeholder="joao@example.com"
                    value="webhook.html@test.com"
                >
            </div>
            
            <div class="form-group">
                <label for="phone">
                    Telefone <span class="required">*</span>
                </label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    required
                    placeholder="11987654321"
                    value="11988776655"
                >
            </div>
            
            <div class="form-group">
                <label for="category">Categoria</label>
                <select id="category" name="category">
                    <option value="CONSULTATION">Consulta</option>
                    <option value="RETIREMENT">Aposentadoria</option>
                    <option value="PROCESS">Processo</option>
                    <option value="BPC_LOAS">BPC/LOAS</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Mensagem (opcional)</label>
                <textarea 
                    id="message" 
                    name="message"
                    placeholder="Deixe uma mensagem..."
                ></textarea>
            </div>
            
            <button type="submit">
                <span class="icon">🚀</span> Enviar Webhook
            </button>
        </form>
        
        <div id="message" class="message"></div>
    </div>
    
    <script>
        const form = document.getElementById('webhookForm');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Pega valores do formulário
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                category: document.getElementById('category').value,
                origin: 'Website HTML Test',
                message: document.getElementById('message').value,
            };
            
            // Mostra loading
            messageDiv.className = 'message loading';
            messageDiv.innerHTML = '<span class="loading-spinner"></span>Enviando...';
            
            try {
                const response = await fetch('http://localhost:3000/api/webhooks/forms', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-webhook-token': 'seu-webhook-token-super-seguro-2026'
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = `
                        <strong>✅ Sucesso!</strong><br>
                        Lead criado com ID: <code>${result.data.id}</code><br>
                        Nome: ${result.data.name}<br>
                        Email: ${result.data.email}
                    `;
                    form.reset();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = `
                        <strong>❌ Erro:</strong><br>
                        ${result.error}
                    `;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.innerHTML = `
                    <strong>❌ Erro de Conexão:</strong><br>
                    Não foi possível conectar ao webhook.<br>
                    ${error.message}
                `;
            }
        });
    </script>
</body>
</html>
